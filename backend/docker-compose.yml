services:
  construyendo_postgres:
    image: postgres:16-alpine
    container_name: construyendo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-construyendo}
      POSTGRES_USER: ${POSTGRES_USER:-construyendo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-construyendo_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - construyendo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-construyendo} -d ${POSTGRES_DB:-construyendo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  construyendo_api:
    build:
      context: ./Construyendo.Api
      dockerfile: Dockerfile
    container_name: construyendo_api
    restart: unless-stopped
    depends_on:
      construyendo_postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=construyendo_postgres;Port=5432;Database=construyendo;Username=construyendo;Password=construyendo_dev_password}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-}
      COOKIE_NAME: ${COOKIE_NAME:-construyendo_admin_dev}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      MEDIA_STORAGE_ROOT: ${MEDIA_STORAGE_ROOT:-/app/uploads}
      MEDIA_PUBLIC_BASE_PATH: ${MEDIA_PUBLIC_BASE_PATH:-/uploads}
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-5242880}
      MEDIA_ALLOWED_IMAGE_TYPES: ${MEDIA_ALLOWED_IMAGE_TYPES:-image/jpeg,image/png,image/webp}
      DATA_PROTECTION_KEYS_PATH: ${DATA_PROTECTION_KEYS_PATH:-/app/keys}
    ports:
      - "5000:8080"
    volumes:
      - construyendo_uploads:/app/uploads
      - construyendo_dataprotection_keys:/app/keys

volumes:
  construyendo_postgres_data:
  construyendo_uploads:
  construyendo_dataprotection_keys:
